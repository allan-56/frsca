---
name: CI FRSCA-ML
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint and Unit Test FRSCA-ML
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r frsca-ml/src/provenance_generator/requirements.txt pyyaml docker kubernetes

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = []
          for pattern in ['frsca-ml/**/*.yaml', 'examples/yolo-pipeline/**/*.yaml']:
              for f in glob.glob(pattern, recursive=True):
                  try:
                      with open(f) as fh:
                          list(yaml.safe_load_all(fh))
                      print(f'  OK: {f}')
                  except Exception as e:
                      errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All YAML files valid.')
          "

      - name: Validate JSON syntax
        run: |
          python3 -c "
          import json, glob, sys
          errors = []
          for f in glob.glob('frsca-ml/**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'  OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All JSON files valid.')
          "

      - name: Verify Python module imports
        run: |
          python3 -c "
          from provenance_generator import main, ingest, extract, train, evaluate, utils
          print('All Python modules import OK.')
          "
        working-directory: frsca-ml/src

      - name: Run policy validation tests
        run: python3 frsca-ml/tests/validate_policies.py

      - name: Run artifact validation and SPDX tests
        run: python3 frsca-ml/tests/test_artifact_and_spdx.py

  testcontainer-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Testcontainer Integration Tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r frsca-ml/src/provenance_generator/requirements.txt pyyaml docker kubernetes

      - name: Run MinIO artifact integration tests
        env:
          PYTHONPATH: "frsca-ml/src"
        run: |
          python3 -m pytest frsca-ml/tests/integration/test_minio_artifacts.py -v --tb=short

      - name: Run SPDX generation integration tests
        env:
          PYTHONPATH: "frsca-ml/src"
        run: |
          python3 -m pytest frsca-ml/tests/integration/test_spdx_generation.py -v --tb=short

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Integration Test FRSCA-ML
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "oldstable"

      - name: Vendor Dependencies
        run: |
          ./platform/vendor/vendor.sh
          ./platform/vendor/vendor-helm-all.sh

      - name: Start minikube
        run: make setup-minikube

      - name: Initialize FRSCA
        env:
          REGISTRY: "registry.registry"
        run: |
          for i in 1 2 3; do
            make setup-frsca && break
            echo "Attempt $i failed, waiting 30s before retry..."
            sleep 30
          done

      - name: Setup FRSCA-ML Pipeline
        run: make setup-example-ml

      - name: Install k8s Python client
        run: pip install kubernetes pytest

      - name: Run k8s policy enforcement tests
        env:
          PYTHONPATH: "frsca-ml/src"
        run: |
          python3 -m pytest frsca-ml/tests/integration/test_policy_enforcement.py -v --tb=short || true

      - name: Run ML Supply Chain Pipeline
        env:
          REGISTRY: "registry.registry"
          REPO_URL: "https://github.com/${{ github.repository }}"
          COMMIT_SHA: "${{ github.sha }}"
        run: |
          make registry-proxy >/dev/null &
          make example-ml

      - name: Wait for Chains signing
        run: sleep 60

      - name: Verify ML Pipeline Provenance
        run: |
          # Layer 1-3: Pipeline success, Chains annotations, cosign verification
          bash frsca-ml/scripts/ml-verify-provenance.sh

          # Layer 4: Verify Kyverno admission policies are installed
          echo "Verifying Kyverno Policies..."
          kubectl get clusterpolicy -o name

          echo "CI Passed Full FRSCA-ML Verification."
