---
name: CI FRSCA-ML
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint and Unit Test FRSCA-ML
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r frsca-ml/src/provenance_generator/requirements.txt pyyaml

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, glob, sys
          errors = []
          for pattern in ['frsca-ml/**/*.yaml', 'examples/yolo-pipeline/**/*.yaml']:
              for f in glob.glob(pattern, recursive=True):
                  try:
                      with open(f) as fh:
                          list(yaml.safe_load_all(fh))
                      print(f'  OK: {f}')
                  except Exception as e:
                      errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All YAML files valid.')
          "

      - name: Validate JSON syntax
        run: |
          python3 -c "
          import json, glob, sys
          errors = []
          for f in glob.glob('frsca-ml/**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'  OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All JSON files valid.')
          "

      - name: Verify Python module imports
        run: |
          python3 -c "
          from provenance_generator import main, ingest, extract, train, evaluate, utils
          print('All Python modules import OK.')
          "
        working-directory: frsca-ml/src

      - name: Run policy validation tests
        run: python3 frsca-ml/tests/validate_policies.py

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Integration Test FRSCA-ML
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "oldstable"

      - name: Vendor Dependencies
        run: |
          ./platform/vendor/vendor.sh
          ./platform/vendor/vendor-helm-all.sh

      - name: Start minikube
        run: |
          make setup-minikube

      - name: Initialize FRSCA
        env:
          REGISTRY: "registry.registry"
        run: |
          # Retry setup-frsca to handle cert-manager webhook flakiness
          for i in 1 2 3; do
            make setup-frsca && break
            echo "Attempt $i failed, waiting 30s before retry..."
            sleep 30
          done

      - name: Install FRSCA-ML Components
        run: |
          echo "Installing Tasks and Pipelines..."
          kubectl apply -f frsca-ml/tekton/tasks/
          kubectl apply -f frsca-ml/tekton/pipelines/

          echo "Configuring Chains for FRSCA-ML..."
          kubectl patch configmap chains-config -n tekton-chains \
            -p '{"data":{"artifacts.taskrun.format":"slsa/v1","artifacts.taskrun.storage":"oci","transparency.enabled":"true"}}'

          kubectl delete pod -n tekton-chains -l app=tekton-chains-controller
          kubectl wait --for=condition=ready pod -l app=tekton-chains-controller -n tekton-chains --timeout=300s

      - name: Run ML Supply Chain Pipeline
        env:
          REGISTRY: "registry.registry"
          REPO_URL: "https://github.com/${{ github.repository }}"
          COMMIT_SHA: "${{ github.sha }}"
        run: |
          make registry-proxy >/dev/null &

          echo "Starting Pipeline..."
          tkn pipeline start ml-supply-chain-pipeline \
            --param git-url="${REPO_URL}" \
            --param git-revision="${COMMIT_SHA}" \
            --param dataset-url="https://example.com/dummy/dataset.csv" \
            --param evaluation-data-url="https://example.com/dummy/eval.csv" \
            --param context-dir="frsca-ml" \
            --workspace name=shared-workspace,volumeClaimTemplateFile=platform/tekton/pvc.yaml \
            --use-param-defaults \
            --showlog

          if [ "$(tkn pr describe --last -o jsonpath='{.status.conditions[?(@.type == "Succeeded")].status}')" != "True" ]; then
            echo "Pipeline failed!"
            tkn pr describe --last
            exit 1
          fi

      - name: Verify Artifacts and Policy
        run: |
          TASK_RUNS=($(tkn pr describe --last -o jsonpath='{.status.childReferences}' | jq -r '.[] | select(.kind | match("TaskRun")) | .name'))
          for tr in "${TASK_RUNS[@]}"; do
            SIGNED=$(kubectl get taskrun "${tr}" -o jsonpath='{.metadata.annotations.chains\.tekton\.dev/signed}')
            if [ "$SIGNED" == "true" ]; then
              echo "TaskRun ${tr} was signed."
            fi
          done

          echo "Verifying Kyverno Policies (standard FRSCA policies)..."
          kubectl get clusterpolicy -o name

          echo "CI Passed Integration Verification."
