apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ai-bom-and-accuracy
  annotations:
    policies.kyverno.io/title: Require AI-BOM and Minimum Accuracy
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/subject: InferenceService
    policies.kyverno.io/description: >-
      This policy ensures that all deployed InferenceServices have a valid
      FRSCA-ML provenance attestation and meet the minimum accuracy threshold.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-ml-provenance
      match:
        any:
          - resources:
              kinds:
                - InferenceService
              apiGroups:
                - serving.kserve.io
      verifyImages:
        - imageReferences:
            - "registry.example.com/models/*"
          attestations:
            - predicateType: https://frsca.dev/provenance/ml-training/v0.2
              conditions:
                - all:
                    - key: "{{ predicate.mlSpecifics.metrics.accuracy }}"
                      operator: GreaterThan
                      value: 0.85
        - imageReferences:
            - "registry.example.com/models/*"
          attestations:
            - predicateType: https://cyclonedx.org/bom
              conditions:
                - all:
                    - key: "{{ predicate.components[?type=='machine-learning-model'] | length(@) }}"
                      operator: GreaterThan
                      value: 0
