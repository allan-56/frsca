apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-model-provenance
  annotations:
    policies.kyverno.io/title: Require Complete Model Provenance
    policies.kyverno.io/subject: InferenceService, Pod
    policies.kyverno.io/description: >-
      Ensures that the model artifact was built by a trusted FRSCA
      pipeline task and uses approved framework versions.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-builder-identity
      match:
        any:
          - resources:
              kinds:
                - InferenceService
                - Pod
      verifyImages:
        - imageReferences:
            - "registry.example.com/models/*"
          attestations:
            - predicateType: https://frsca.dev/provenance/ml-training/v0.2
              conditions:
                - all:
                    - key: "{{ predicate.runDetails.builder.id }}"
                      operator: Equals
                      value: "frsca-training-task"
                    - key: "{{ predicate.mlSpecifics.environment.frameworkVersion }}"
                      operator: PatternMatch
                      value: "2.*"
